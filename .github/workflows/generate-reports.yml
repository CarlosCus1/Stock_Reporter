name: Generar Reportes de Stock

on:
  # Ejecutar manualmente
  workflow_dispatch:
  # Ejecutar diariamente de lunes a sábado entre 7am y 11pm (hora de Perú: UTC-5)
  schedule:
    - cron: '0 12-23 * * 1-6'
    - cron: '0 0-4 * * 1-6'

permissions:
  contents: write

jobs:
  generate-reports:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm install xlsx exceljs
      
      - name: Convert codigos_generales.xlsx to JSON
        run: node scripts/convert-codigos.js
      
      - name: Download stock and generate reports
        run: node scripts/merge-stock.js
        env:
          STOCK_URL: ${{ secrets.STOCK_URL }}
      
      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
      
      - name: Commit generated reports
        run: |
          # Añadir todos los archivos generados tanto en la raíz como en el frontend
          git add reports/*.xlsx || true
          git add Data/*.json || true
          git add frontend/public/reports/*.xlsx || true
          git add frontend/public/productos_con_stock.json || true
        
      - name: Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 Auto-generate: Reportes de stock $(date +'%d-%m-%y')"
      
      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stock-reports
          path: reports/
          retention-days: 30
